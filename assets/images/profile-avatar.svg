<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2691e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="35" fill="url(#skinGradient)"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="62" r="5" fill="#000"/>
  <circle cx="112" cy="62" r="5" fill="#000"/>
  <circle cx="89" cy="61" r="2" fill="#fff"/>
  <circle cx="113" cy="61" r="2" fill="#fff"/>
  
  <!-- Smile -->
  <path d="M 88 75 Q 100 82 112 75" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="40" ry="45" fill="url(#skinGradient)"/>
  
  <!-- Shirt/Clothing -->
  <path d="M 60 115 Q 60 135 70 145 L 130 145 Q 140 135 140 115" fill="#4a90e2"/>
  <circle cx="100" cy="130" r="4" fill="#58a6ff"/>
</svg>